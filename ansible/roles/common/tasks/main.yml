---
- name: Update all yum packages
  yum:
    name: '*'
    state: latest
    update_cache: true

- name: Install development tools and libraries
  yum:
    name:
      - git
      - curl
      - wget
      - gcc
      - gcc-c++
      - make
      - patch
      - openssl-devel
      - readline-devel
      - zlib-devel
      - libyaml-devel
      - libffi-devel
      - bzip2
      - tar
      - ImageMagick
      - ImageMagick-devel
    state: present

# serverspec の describe user('www-data') テストを通過するために作成
- name: Create www-data group
  group:
    name: www-data
    state: present

- name: Create www-data user
  user:
    name: www-data
    group: www-data
    system: true
    shell: /sbin/nologin
    home: /var/www
    create_home: false
    state: present
