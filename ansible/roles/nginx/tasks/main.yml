---
- name: Install Nginx
  yum:
    name: nginx
    state: present

- name: Deploy Nginx virtual host config for the app
  template:
    src: app.conf.j2
    dest: /etc/nginx/conf.d/app.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Nginx

- name: Start and enable Nginx service
  service:
    name: nginx
    state: started
    enabled: true
