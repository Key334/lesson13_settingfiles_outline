---
- name: Install Nginx
  yum:
    name: nginx
    state: present

- name: Deploy Nginx virtual host config for the app
  template:
    src: app.conf.j2
    dest: /etc/nginx/conf.d/app.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Nginx

# nginx が /home/ec2-user/ 配下のソケットに到達できるよう実行権限を付与
- name: Allow nginx to traverse ec2-user home directory
  file:
    path: /home/ec2-user
    mode: '0711'

- name: Start and enable Nginx service
  service:
    name: nginx
    state: started
    enabled: true
