version: 2.1

# ================================================================
# CircleCI に設定が必要な環境変数（Project Settings > Environment Variables）
#
#   AWS_ACCESS_KEY_ID        : AWSアクセスキーID
#   AWS_SECRET_ACCESS_KEY    : AWSシークレットアクセスキー
#   KEY_NAME                 : EC2キーペア名（例: my-keypair）
#   MY_CIDR_IP               : SSH接続を許可するCIDR（例: 0.0.0.0/0）
#   SECRET_KEY_BASE          : Railsのsecret_key_base（ruby -e "require 'securerandom'; puts SecureRandom.hex(64)" で生成）
#   S3_BUCKET_NAME           : S3バケット名（例: raisetech-lecture10-cf）
#
#   ※ DB_USERNAME / DB_PASSWORD は Secrets Manager から自動取得するため不要
#   ※ SSH秘密鍵のフィンガープリントは下記 add_ssh_keys に直接記入してください
#     （Project Settings > SSH Keys で確認できます）
# ================================================================

executors:
  python-executor:
    docker:
      - image: cimg/python:3.11
    environment:
      AWS_DEFAULT_REGION: ap-northeast-1

  ruby-executor:
    docker:
      - image: cimg/ruby:3.2
    environment:
      AWS_DEFAULT_REGION: ap-northeast-1

jobs:
  # ----------------------------------------------------------------
  # 1. CloudFormation テンプレートの静的解析
  # ----------------------------------------------------------------
  cfn-lint:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install cfn-lint
          command: pip install cfn-lint
      - run:
          name: Lint CloudFormation template
          command: cfn-lint cloudformation/templete.yml --ignore-checks W

  # ----------------------------------------------------------------
  # 2. CloudFormation スタックのデプロイ
  # ----------------------------------------------------------------
  execute-cloudformation:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install AWS CLI
          command: pip install awscli
      - run:
          name: Deploy CloudFormation stack
          command: |
            aws cloudformation deploy \
              --template-file cloudformation/templete.yml \
              --stack-name raisetech2-lecture13 \
              --parameter-overrides \
                KeyName=${KEY_NAME} \
                MyCidrIp=${MY_CIDR_IP} \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset
          no_output_timeout: 30m
      - run:
          name: Get EC2 public IP
          command: |
            EC2_ID=$(aws cloudformation describe-stacks \
              --stack-name raisetech2-lecture13 \
              --query "Stacks[0].Outputs[?OutputKey=='EC2Id'].OutputValue" \
              --output text)

            EC2_IP=$(aws ec2 describe-instances \
              --instance-ids ${EC2_ID} \
              --query "Reservations[0].Instances[0].PublicIpAddress" \
              --output text)

            echo "EC2 IP: ${EC2_IP}"
            echo ${EC2_IP} > /tmp/ec2_ip.txt
      - run:
          name: Get RDS endpoint
          command: |
            RDS_ENDPOINT=$(aws rds describe-db-instances \
              --db-instance-identifier database-2 \
              --query "DBInstances[0].Endpoint.Address" \
              --output text)

            echo "RDS Endpoint: ${RDS_ENDPOINT}"
            echo ${RDS_ENDPOINT} > /tmp/rds_endpoint.txt
      - run:
          name: Show ALB DNS Name
          command: |
            ALB_DNS=$(aws cloudformation describe-stacks \
              --stack-name raisetech2-lecture13 \
              --query "Stacks[0].Outputs[?OutputKey=='ALBDnsName'].OutputValue" \
              --output text)

            echo ${ALB_DNS} > /tmp/alb_dns.txt
            echo "=========================================="
            echo "  アプリURL: http://${ALB_DNS}"
            echo "=========================================="
      - persist_to_workspace:
          root: /tmp
          paths:
            - ec2_ip.txt
            - rds_endpoint.txt
            - alb_dns.txt

  # ----------------------------------------------------------------
  # 3. Ansible による環境構築・アプリデプロイ
  # ----------------------------------------------------------------
  execute-ansible:
    executor: python-executor
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - add_ssh_keys:
          fingerprints:
            - "SHA256:nONAvnXGlJFZcO9NMGeTRbl9Qcgq78/PyHzEGYe5VaE"  # ← Project Settings > SSH Keys のフィンガープリントに書き換えてください
      - run:
          name: Install Ansible
          command: pip install ansible
      - run:
          name: Disable SSH strict host key checking
          command: |
            mkdir -p ~/.ssh
            echo "Host *" >> ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
      - run:
          name: Generate inventory from EC2 IP
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            cat > ansible/inventory << EOF
            [web]
            ec2 ansible_host=${EC2_IP} ansible_user=ec2-user
            EOF
      - run:
          name: Fetch DB credentials from Secrets Manager
          command: |
            aws secretsmanager get-secret-value \
              --secret-id MySecret \
              --query SecretString \
              --output text | python3 -c "
            import sys, json, os, shlex
            s = json.load(sys.stdin)
            with open(os.environ['BASH_ENV'], 'a') as f:
                f.write('export DB_USERNAME=' + shlex.quote(s['username']) + '\n')
                f.write('export DB_PASSWORD=' + shlex.quote(s['password']) + '\n')
            "
      - run:
          name: Run Ansible playbook
          command: |
            RDS_ENDPOINT=$(cat /tmp/rds_endpoint.txt)
            cd ansible
            ansible-playbook -i inventory playbook.yml \
              -e "db_host=${RDS_ENDPOINT}" \
              -e "db_username=${DB_USERNAME}" \
              -e "db_password=${DB_PASSWORD}" \
              -e "secret_key_base=${SECRET_KEY_BASE}" \
              -e "s3_bucket_name=${S3_BUCKET_NAME}"
          no_output_timeout: 40m

  # ----------------------------------------------------------------
  # 4. Serverspec によるインフラテスト
  # ----------------------------------------------------------------
  execute-serverspec:
    executor: ruby-executor
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - add_ssh_keys:
          fingerprints:
            - "SHA256:nONAvnXGlJFZcO9NMGeTRbl9Qcgq78/PyHzEGYe5VaE"  # ← Project Settings > SSH Keys のフィンガープリントに書き換えてください
      - run:
          name: Disable SSH strict host key checking
          command: |
            mkdir -p ~/.ssh
            echo "Host *" >> ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
      - run:
          name: Install serverspec
          command: cd serverspec && bundle install
      - run:
          name: Run serverspec
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            cd serverspec && TARGET_HOST=${EC2_IP} bundle exec rspec suverspec.rb --format documentation
      - run:
          name: Show app URL
          command: |
            ALB_DNS=$(cat /tmp/alb_dns.txt)
            echo "=========================================="
            echo "  全テスト通過！"
            echo "  アプリURL: http://${ALB_DNS}"
            echo "=========================================="

# ================================================================
# ワークフロー定義
# ================================================================
workflows:
  deploy-and-test:
    jobs:
      - cfn-lint
      - execute-cloudformation:
          requires:
            - cfn-lint
      - execute-ansible:
          requires:
            - execute-cloudformation
      - execute-serverspec:
          requires:
            - execute-ansible
